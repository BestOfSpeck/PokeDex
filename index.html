<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <script src="script.js"></script>
    <link rel="icon" type="image/x-icon" href="/assets/img/pngwing.com (2).png">
    <title>PokeDex</title>
</head>

<body onload="loadPokedex()">

    <div class="input-container">
        <input type="text" id="search_input" placeholder="...search Pokemon...">
    </div>

    <div id="pokedex">
        <div>
            <h1 id="pokedex_info_name"></h1>
            <span id="pokedex_info_type"></span>
        </div>

        <span id="pokedex_info_id"></span>
    </div>

    <div class="info-container">
        <img id="pokemon_img" src="" alt="">
    </div>

    <div class="navigation">
        <div class="btn-group " role="group" aria-label="Basic radio toggle button group">
            <input type="radio" class="btn-check" name="btnradio" id="btnradio1" autocomplete="off" checked>
            <label id="btn_radio_0" onclick="switchInformationes1()" class="btn btn-basic" for="btnradio1">About</label>

            <input type="radio" class="btn-check" name="btnradio" id="btnradio2" autocomplete="off">
            <label id="btn_radio_1" onclick="switchInformationes2()" class="btn btn-basic" for="btnradio2">Base Stats</label>

            <input type="radio" class="btn-check" name="btnradio" id="btnradio3" autocomplete="off">
            <label id="btn_radio_3" onclick="switchInformationes3()" class="btn btn-basic" for="btnradio3">Moves</label>
        </div>
    </div>


    <div id="about_container">
        <table>
            <tr>
                <td class="ml100">Species</td>
                <td id="pokedex_info_species" class="ml100 bold"></td>
            </tr>
            <tr>
                <td class="ml100">Height</td>
                <td id="pokedex_info_height" class="ml100 bold"></td>
            </tr>
            <tr>
                <td class="ml100">Weight</td>
                <td id="pokedex_info_weight" class="ml100 bold"></td>
            </tr>
            <tr>
                <td class="ml100">Abilities</td>
                <td id="pokedex_info_abilities" class="ml100 bold"></td>
            </tr>
        </table>
    </div>

    <div id="baseStats_container" class="baseStats-container d-none">
        <table>
            <tr>
                <td class="ml1000">HP</td>
                <td class="ml1000" id="baseStat_hp">1</td>
            </tr>
            <tr>
                <td class="ml1000">Attack</td>
                <td class="ml1000" id="baseStat_attack">1</td>
            </tr>
            <tr>
                <td class="ml1000">Defense</td>
                <td class="ml1000" id="baseStat_defense">1</td>
            </tr>
            <tr>
                <td class="ml1000">Sp. Atk</td>
                <td class="ml1000" id="baseStat_spAtk">1</td>
            </tr>
            <tr>
                <td class="ml1000">Sp. Def</td>
                <td class="ml1000" id="baseStat_sp_def">1</td>
            </tr>
            <tr>
                <td class="ml1000">Speed</td>
                <td class="ml1000" id="baseStat_speed">1</td>
            </tr>
        </table>

        <div class="progress-container">
            <div class="progress">
                <div id="progress_bar_0" class="progress-bar" role="progressbar" aria-label="Basic example" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <div class="progress">
                <div id="progress_bar_1" class="progress-bar" role="progressbar" aria-label="Basic example" style="width: 0%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <div class="progress">
                <div id="progress_bar_2" class="progress-bar" role="progressbar" aria-label="Basic example" style="width: 0%" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <div class="progress">
                <div id="progress_bar_3" class="progress-bar" role="progressbar" aria-label="Basic example" style="width: 0%" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <div class="progress">
                <div id="progress_bar_4" class="progress-bar" role="progressbar" aria-label="Basic example" style="width: 0%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
            <div class="progress">
                <div id="progress_bar_5" class="progress-bar" role="progressbar" aria-label="Basic example" style="width: 0%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
        </div>
    </div>



    <div class="d-none" id="moves_container"></div>

</body>

</html>
